var rexPat = new RegExp(cname+"=[^;]*");
var allCookie = document.cookie;
var myCookie = rexPat.exec(allCookie);
if(myCookie){
var cookie=myCookie[0].split("=");
return unescape(cookie[1]);
}else{
return null;
}
